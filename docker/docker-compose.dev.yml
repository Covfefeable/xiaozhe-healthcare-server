services:
  postgres:
    image: pgvector/pgvector:pg15
    container_name: ${COMPOSE_PROJECT_NAME:-xiaozhe-medical}-postgres-dev
    command: >
      postgres
      -c max_connections=${POSTGRES_MAX_CONNECTIONS:-100}
      -c shared_buffers=${POSTGRES_SHARED_BUFFERS:-128MB}
      -c work_mem=${POSTGRES_WORK_MEM:-4MB}
      -c maintenance_work_mem=${POSTGRES_MAINTENANCE_WORK_MEM:-64MB}
      -c effective_cache_size=${POSTGRES_EFFECTIVE_CACHE_SIZE:-4096MB}
      -c statement_timeout=${POSTGRES_STATEMENT_TIMEOUT:-0}
      -c idle_in_transaction_session_timeout=${POSTGRES_IDLE_IN_TRANSACTION_SESSION_TIMEOUT:-0}
    environment:
      POSTGRES_USER: ${DB_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-xiaozhe123456}
      POSTGRES_DB: ${DB_DATABASE:-xiaozhe_medical}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - ./volumes/postgres-dev:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-postgres} -d ${DB_DATABASE:-xiaozhe_medical}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - xiaozhe-dev-network

  redis:
    image: redis:7-alpine
    container_name: ${COMPOSE_PROJECT_NAME:-xiaozhe-medical}-redis-dev
    ports:
      - "6379:6379"
    volumes:
      - ./volumes/redis-dev:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - xiaozhe-dev-network

networks:
  xiaozhe-dev-network:
    driver: bridge
